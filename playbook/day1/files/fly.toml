# fly.toml — broker-demo
# Day 1 change: build args removed. ALL secrets now come from `fly secrets set`.
# The "ohttps://" typo is fixed by setting NEXT_PUBLIC_SUPABASE_URL via secrets, not here.

app = "broker-demo"
primary_region = "dfw"

[build]
  # No build args — secrets are runtime env, set via `fly secrets set`.

[env]
  NEXT_PUBLIC_APP_URL = "https://broker-demo.fly.dev"
  # NEXT_PUBLIC_DEMO_MODE intentionally not set here — set via `fly secrets set` per-app.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
